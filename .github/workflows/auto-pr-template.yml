name: Auto PR Template & Labels

on:
  pull_request:
    types: [opened, edited]

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-template:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Determine template & label
        id: template
        run: |
          branch="${{ github.head_ref }}"
          if [[ "$branch" == feat/* ]]; then
            echo "label=feature" >> $GITHUB_OUTPUT
            template=".github/pull_request_template/feature.md"
          elif [[ "$branch" == fix/* ]]; then
            echo "label=bug" >> $GITHUB_OUTPUT
            template=".github/pull_request_template/bugfix.md"
          elif [[ "$branch" == refactor/* ]]; then
            echo "label=refactor" >> $GITHUB_OUTPUT
            template=".github/pull_request_template/refactor.md"
          elif [[ "$branch" == docs/* ]]; then
            echo "label=docs" >> $GITHUB_OUTPUT
            template=".github/pull_request_template/docs.md"
          else
            echo "label=chore" >> $GITHUB_OUTPUT
            template=".github/pull_request_template.md"
          fi
          echo "template=$template" >> $GITHUB_OUTPUT

      - name: Load template content (JSON safe)
        id: body
        run: |
          body=$(jq -Rs . < "${{ steps.template.outputs.template }}")
          echo "body=$body" >> $GITHUB_OUTPUT

      - name: Update PR body (only if not fork)
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          gh api \
            repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} \
            -X PATCH \
            -f body=${{ steps.body.outputs.body }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add PR label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: ${{ steps.template.outputs.label }}
