name: 🔎 PR Title Check

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        with:
          # Allowed types (match your PR_TITLES.md)
          types: |
            feat
            fix
            docs
            refactor
            style
            test
            chore
          # Optional: enforce a scope (e.g. dashboard, config, theme)
          requireScope: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
